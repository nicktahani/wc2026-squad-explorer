name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      PAGES_DEPLOY_RETRY_DELAY_SECONDS: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Wait before retrying Pages deploy
        if: steps.deployment.outcome == 'failure'
        run: sleep "${PAGES_DEPLOY_RETRY_DELAY_SECONDS}"
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
      - if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "::error::GitHub Pages deployment failed after two attempts."
          exit 1
